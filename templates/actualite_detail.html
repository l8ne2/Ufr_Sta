{% extends "base.html" %}
{% block title %}{{ news.titre }}{% endblock %}

{% block content %}
<div class="detail-hero">
  <div class="container">
    <div class="breadcrumb"><a href="{{ url_for('actualites') }}">Actualités</a> / {{ news.titre }}</div>
    <span class="eyebrow">{{ news.date_pub }}</span>
    <h1>{{ news.titre }}</h1>
  </div>
</div>

<section class="detail-body">
  <div class="container">
    <div class="content">
      {% if news.photo %}
        <img src="{{ news.photo }}" alt="{{ news.titre }}" style="border-radius:6px; margin-bottom:24px;">
      {% endif %}
      <p>{{ news.description }}</p>
      <a href="{{ url_for('actualites') }}" class="card-link">&larr; Retour aux actualités</a>
    </div>
  </div>
</section>
{% endblock %}
