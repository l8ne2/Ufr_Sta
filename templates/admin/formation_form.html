{% extends "admin/base_admin.html" %}
{% block title %}{{ "Modifier" if item else "Ajouter" }} une formation{% endblock %}
{% block page_title %}{{ "Modifier" if item else "Ajouter" }} une formation{% endblock %}

{% block admin_content %}
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label for="nom">Nom de la formation *</label>
      <input type="text" id="nom" name="nom" required value="{{ item.nom if item else '' }}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="niveau">Niveau *</label>
        <select id="niveau" name="niveau" required>
          {% for n in ["Licence", "Master", "Doctorat"] %}
          <option value="{{ n }}" {{ "selected" if item and item.niveau == n }}>{{ n }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="duree">Durée *</label>
        <input type="text" id="duree" name="duree" required placeholder="ex : 3 ans" value="{{ item.duree if item else '' }}">
      </div>
    </div>
    <div class="form-group">
      <label for="departement_id">Département *</label>
      <select id="departement_id" name="departement_id" required>
        {% for d in departements %}
        <option value="{{ d.id }}" {{ "selected" if item and item.departement_id == d.id }}>{{ d.nom }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="conditions_admission">Conditions d'admission</label>
      <input type="text" id="conditions_admission" name="conditions_admission" value="{{ item.conditions_admission if item else '' }}">
    </div>
    <div class="form-group">
      <label for="debouches">Débouchés</label>
      <input type="text" id="debouches" name="debouches" value="{{ item.debouches if item else '' }}">
    </div>
    <div class="form-group">
      <label for="programme">Programme détaillé (une ligne par semestre/module)</label>
      <textarea id="programme" name="programme" placeholder="S1: Algorithmique, Python...&#10;S2: POO, Bases de données...">{{ item.programme if item else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-gold btn-block">{{ "Enregistrer les modifications" if item else "Créer la formation" }}</button>
    <a href="{{ url_for('admin_formations') }}" class="btn btn-block" style="margin-top:10px; text-align:center; border:1px solid var(--grey-line);">Annuler</a>
  </form>
</div>
{% endblock %}
